backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "site_content"
    label: "Website Content"
    files:
      - name: "content"
        label: "Rates & Contact Info"
        file: "content.json"
        fields:
          - { label: "Gold Rate (24K, per 10 grams — number only, e.g. 1,41,500)", name: "gold_rate", widget: "string" }
          - { label: "Silver Rate (per kg — number only, e.g. 2,30,000)", name: "silver_rate", widget: "string" }
          - { label: "Rates Last Updated (e.g. 16 July 2026)", name: "rates_date", widget: "string" }
          - { label: "Primary Phone Number (e.g. 94253 39098)", name: "primary_phone", widget: "string" }
          - { label: "Secondary Phone Number (e.g. 94070 69098)", name: "secondary_phone", widget: "string" }
          - { label: "Shop Address", name: "address", widget: "string" }
